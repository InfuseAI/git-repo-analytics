
version: 2

metrics:

  - name: total_commits
    label: Total commits
    model: ref('commits')

    calculation_method: count_distinct
    expression: hash

    timestamp: datetime
    time_grains: [day, week, month, quarter, year, all_time]

    tags:
    - piperider

  - name: active_authors
    label: Active authors
    model: ref('commits')

    calculation_method: count_distinct
    expression: author

    timestamp: datetime
    time_grains: [day, week, month]

    filters:
      - field: author
        operator: '!='
        value: "'github-actions[bot]'"

    tags:
    - piperider

